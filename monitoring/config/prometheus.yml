global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

rule_files:
  - /etc/prometheus/alert_rules.yml

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Scrape TaskFlow backend metrics via ALB (Fargate-compatible)
  - job_name: 'taskflow-backend-fargate'
    static_configs:
      - targets: ['${ALB_DNS_NAME}']
    metrics_path: '/api/metrics'
    scheme: http
    scrape_interval: 15s
    scrape_timeout: 10s
